name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Provide placeholder env vars so Vite doesn't throw on missing config
          VITE_FIREBASE_API_KEY: ci_placeholder
          VITE_FIREBASE_AUTH_DOMAIN: ci_placeholder
          VITE_FIREBASE_DATABASE_URL: https://ci-placeholder.firebaseio.com
          VITE_FIREBASE_PROJECT_ID: ci_placeholder
          VITE_FIREBASE_STORAGE_BUCKET: ci_placeholder
          VITE_FIREBASE_MESSAGING_SENDER_ID: ci_placeholder
          VITE_FIREBASE_APP_ID: ci_placeholder
          VITE_SENTRY_DSN: ''
